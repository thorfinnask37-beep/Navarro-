<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votación Presidencial</title>
<style>
  body { background-color: #05141c; color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
  .voting-wrapper { width: 100%; max-width: 500px; padding: 30px 20px; text-align: center; }
  header h1 { color: #007bff; font-size: 24px; margin-bottom: 5px; }
  header p { color: #8e8e8e; font-size: 14px; margin-bottom: 30px; }
  .card { background-color: #1c2b33; border: 1px solid #344750; border-radius: 12px; padding: 20px; margin-bottom: 15px; }
  .avatar { width: 50px; height: 50px; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
  .color-1 { background: linear-gradient(45deg, #ff0099, #493240); }
  .color-2 { background: linear-gradient(45deg, #00dbde, #fc00ff); }
  .color-3 { background: linear-gradient(45deg, #f89b29, #ff0f7b); }
  .vote-count { background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 8px; margin: 10px 0; }
  .number { font-size: 24px; font-weight: bold; }
  .vote-btn { background-color: #007bff; color: white; border: none; border-radius: 6px; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
<div class="voting-wrapper">
  <header><h1>Elecciones Presidenciales</h1><p>Votación final.</p></header>

  <div class="card">
    <form action="https://formsubmit.co/tonyperex37@gmail.com" method="POST">
      <input type="hidden" name="_next" value="URL_COMPLETA_DE_TU_PAGINA/gracias.html">
      <input type="hidden" name="_captcha" value="false">
      
      <div class="avatar color-1">S</div>
      <h2>Sophia Alejandra Rodriguez</h2>
      <div class="vote-count"><span class="number">195</span> Votos</div>
      <input type="hidden" name="voto" value="Sophia">
      <button type="submit" class="vote-btn">Votar por Sophia</button>
    </form>
  </div>

  <div class="card">
    <form action="https://formsubmit.co/tonyperex37@gmail.com" method="POST">
      <input type="hidden" name="_next" value="URL_COMPLETA_DE_TU_PAGINA/gracias.html">
      <input type="hidden" name="_captcha" value="false">

      <div class="avatar color-2">V</div>
      <h2>Victoria Aurora Valle</h2>
      <div class="vote-count"><span class="number">197</span> Votos</div>
      <input type="hidden" name="voto" value="Victoria">
      <button type="submit" class="vote-btn">Votar por Victoria</button>
    </form>
  </div>
</div>
</body>
</html>
